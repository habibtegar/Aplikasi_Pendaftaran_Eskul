<!doctype html>
<html lang="id" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - EkskulApp</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: { extend: { fontFamily: { sans: ['Poppins', 'sans-serif'] } } },
      };
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body
    class="h-full bg-slate-950 font-sans flex items-center justify-center relative overflow-hidden"
  >
    <div
      class="absolute -top-40 -left-40 w-96 h-96 bg-blue-500 rounded-full blur-[128px] opacity-20 pointer-events-none"
    ></div>
    <div
      class="absolute -bottom-40 -right-40 w-96 h-96 bg-cyan-500 rounded-full blur-[128px] opacity-20 pointer-events-none"
    ></div>

    <div
      class="w-full max-w-md p-0.5 rounded-2xl bg-gradient-to-br from-blue-500/30 to-cyan-500/10 shadow-2xl relative z-10 mx-4"
    >
      <div
        class="bg-slate-900/90 backdrop-blur-2xl rounded-[15px] p-8 md:p-10 flex flex-col items-center"
      >
        <div
          class="w-12 h-12 bg-gradient-to-br from-blue-500 to-cyan-400 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20 mb-6"
        >
          <i data-lucide="graduation-cap" class="text-white w-6 h-6"></i>
        </div>
        <h2
          class="text-2xl md:text-3xl font-bold text-white mb-2 tracking-tight"
        >
          Selamat Datang
        </h2>
        <p class="text-slate-400 text-sm mb-6 text-center">
          Masuk ke EkskulApp untuk mengelola kegiatan ekskul Anda
        </p>

        <div
          id="successBanner"
          class="hidden w-full mb-6 p-3.5 rounded-xl bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 text-xs flex items-center gap-2"
        >
          <i data-lucide="check-circle" class="w-4 h-4 flex-shrink-0"></i>
          <span>Registrasi sukses! Silakan login menggunakan akun Anda.</span>
        </div>

        <div
          id="errorBanner"
          class="hidden w-full mb-6 p-3.5 rounded-xl bg-rose-500/10 border border-rose-500/30 text-rose-400 text-xs flex items-center gap-2"
        >
          <i data-lucide="alert-circle" class="w-4 h-4 flex-shrink-0"></i>
          <span id="errorMessage">Username atau password salah.</span>
        </div>

        <form id="loginForm" class="w-full space-y-5">
          <div class="space-y-1.5">
            <label
              class="text-xs font-semibold text-slate-300 tracking-wide uppercase"
              >Username / NIS</label
            >
            <div class="relative">
              <span
                class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-slate-500"
              >
                <i data-lucide="user" class="w-5 h-5"></i>
              </span>
              <input
                type="text"
                id="username"
                placeholder="Masukkan Username atau NIS"
                required
                class="w-full pl-11 pr-4 py-3 bg-slate-950/60 border border-slate-800 rounded-xl text-slate-100 placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-400 transition-all duration-200"
              />
            </div>
          </div>

          <div class="space-y-1.5">
            <label
              class="text-xs font-semibold text-slate-300 tracking-wide uppercase"
              >Password</label
            >
            <div class="relative">
              <span
                class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-slate-500"
              >
                <i data-lucide="key-round" class="w-5 h-5"></i>
              </span>
              <input
                type="password"
                id="password"
                placeholder="••••••••"
                required
                class="w-full pl-11 pr-4 py-3 bg-slate-950/60 border border-slate-800 rounded-xl text-slate-100 placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-400 transition-all duration-200"
              />
            </div>
          </div>

          <div class="pt-2">
            <button
              type="submit"
              class="w-full bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-500 hover:to-cyan-400 text-white font-semibold py-3 px-4 rounded-xl shadow-lg shadow-blue-500/20 hover:shadow-cyan-500/30 hover:scale-[1.02] active:scale-[0.98] transition-all duration-300"
            >
              Masuk
            </button>
          </div>
        </form>

        <p class="text-slate-400 text-sm mt-8">
          Belum punya akun?
          <a
            href="register.html"
            class="text-cyan-400 hover:text-cyan-300 font-semibold transition-colors duration-200 ml-1"
            >Daftar disini</a
          >
        </p>
        <p class="text-slate-600 text-xs mt-3">
          Admin?
          <a
            href="admin_login.html"
            class="text-violet-400 hover:text-violet-300 font-semibold transition-colors duration-200 ml-1"
            >Login Admin</a
          >
        </p>
      </div>
    </div>

    <script>
      lucide.createIcons();

      if (localStorage.getItem('sessionUser')) {
        window.location.href = 'beranda.html';
      }

      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('registered') === 'true') {
        document.getElementById('successBanner').classList.remove('hidden');
      }

      document
        .getElementById('loginForm')
        .addEventListener('submit', function (e) {
          e.preventDefault();
          const username = document.getElementById('username').value.trim();
          const password = document.getElementById('password').value;
          const errorBanner = document.getElementById('errorBanner');
          const errorMessage = document.getElementById('errorMessage');
          errorBanner.classList.add('hidden');

          const users = JSON.parse(
            localStorage.getItem('registeredUsers') || '[]',
          );
          const user = users.find(
            (u) =>
              (u.username === username || u.nisn === username) &&
              u.password === password,
          );

          if (user) {
            localStorage.setItem('sessionUser', JSON.stringify(user));
            window.location.href = 'beranda.html';
          } else {
            const exists = users.find(
              (u) => u.username === username || u.nisn === username,
            );
            errorMessage.textContent = exists
              ? 'Password salah. Coba lagi.'
              : 'Akun tidak ditemukan. Silakan registrasi terlebih dahulu.';
            errorBanner.classList.remove('hidden');
          }
        });
    </script>
  </body>
</html>
