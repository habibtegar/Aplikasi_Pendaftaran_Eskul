<!DOCTYPE html>
<html lang="id" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - EkskulApp</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Poppins', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="h-full bg-slate-950 font-sans flex items-center justify-center relative overflow-hidden">
  <!-- Ambient Gradient Background Elements -->
  <div class="absolute -top-40 -left-40 w-96 h-96 bg-blue-500 rounded-full blur-[128px] opacity-20 pointer-events-none"></div>
  <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-cyan-500 rounded-full blur-[128px] opacity-20 pointer-events-none"></div>

  <!-- Outer Glow Rings (SaaS Style) -->
  <div class="w-full max-w-md p-0.5 rounded-2xl bg-gradient-to-br from-blue-500/30 to-cyan-500/10 shadow-2xl relative z-10 mx-4">
    <!-- Card Content -->
    <div class="bg-slate-900/90 backdrop-blur-2xl rounded-[15px] p-8 md:p-10 flex flex-col items-center">
      <!-- Logo / Icon -->
      <div class="w-12 h-12 bg-gradient-to-br from-blue-500 to-cyan-400 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20 mb-6">
        <i data-lucide="graduation-cap" class="text-white w-6 h-6"></i>
      </div>
      
      <h2 class="text-2xl md:text-3xl font-bold text-white mb-2 tracking-tight">Selamat Datang</h2>
      <p class="text-slate-400 text-sm mb-6 text-center">Masuk ke EkskulApp untuk mengelola kegiatan ekskul Anda</p>
      
      <!-- Notification Banners -->
      <div id="successBanner" class="hidden w-full mb-6 p-3.5 rounded-xl bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 text-xs flex items-center gap-2">
        <i data-lucide="check-circle" class="w-4 h-4 flex-shrink-0"></i>
        <span>Registrasi sukses! Silakan login menggunakan akun Anda.</span>
      </div>

      <div id="errorBanner" class="hidden w-full mb-6 p-3.5 rounded-xl bg-rose-500/10 border border-rose-500/30 text-rose-400 text-xs flex items-center gap-2">
        <i data-lucide="alert-circle" class="w-4 h-4 flex-shrink-0"></i>
        <span id="errorMessage">Anda belum terdaftar! Silakan lakukan registrasi terlebih dahulu.</span>
      </div>

      <form id="loginForm" class="w-full space-y-5">
        <!-- Input Username/NIS -->
        <div class="space-y-1.5">
          <label class="text-xs font-semibold text-slate-300 tracking-wide uppercase">Username / NIS</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-slate-500">
              <i data-lucide="user" class="w-5 h-5"></i>
            </span>
            <input type="text" id="username" placeholder="Masukkan Username atau NIS" required
              class="w-full pl-11 pr-4 py-3 bg-slate-950/60 border border-slate-800 rounded-xl text-slate-100 placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-400 transition-all duration-200">
          </div>
        </div>

        <!-- Input Password -->
        <div class="space-y-1.5">
          <label class="text-xs font-semibold text-slate-300 tracking-wide uppercase">Password</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-slate-500">
              <i data-lucide="key-round" class="w-5 h-5"></i>
            </span>
            <input type="password" id="password" placeholder="••••••••" required
              class="w-full pl-11 pr-4 py-3 bg-slate-950/60 border border-slate-800 rounded-xl text-slate-100 placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-400 transition-all duration-200">
          </div>
        </div>

        <!-- Submit Button -->
        <div class="pt-2">
          <button type="submit" 
            class="w-full bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-500 hover:to-cyan-400 text-white font-semibold py-3 px-4 rounded-xl shadow-lg shadow-blue-500/20 hover:shadow-cyan-500/30 hover:scale-[1.02] active:scale-[0.98] transition-all duration-300">
            Masuk
          </button>
        </div>
      </form>

      <!-- Footer links -->
      <p class="text-slate-400 text-sm mt-8">
        Belum punya akun? 
        <a href="register.html" class="text-cyan-400 hover:text-cyan-300 font-semibold transition-colors duration-200 ml-1">Daftar disini</a>
      </p>
    </div>
  </div>

  <!-- Lucide Icons Script -->
  <script>
    lucide.createIcons();

    // Check if redirect has registered query
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('registered') === 'true') {
      document.getElementById('successBanner').classList.remove('hidden');
    }

    // Handle form submission
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const errorBanner = document.getElementById('errorBanner');
      const successBanner = document.getElementById('successBanner');
      
      // Hide active alerts
      errorBanner.classList.add('hidden');
      
      const isRegistered = localStorage.getItem('isRegistered');

      if (isRegistered === 'true') {
        // Success login
        successBanner.classList.add('hidden');
        window.location.href = 'beranda.html';
      } else {
        // Failed login - not registered
        errorBanner.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
