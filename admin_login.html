<!doctype html>
<html lang="id" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Admin - EkskulApp</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: { extend: { fontFamily: { sans: ['Poppins', 'sans-serif'] } } },
      };
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body
    class="h-full bg-slate-950 font-sans flex items-center justify-center relative overflow-hidden"
  >
    <div
      class="absolute -top-40 -left-40 w-96 h-96 bg-violet-600 rounded-full blur-[128px] opacity-20 pointer-events-none"
    ></div>
    <div
      class="absolute -bottom-40 -right-40 w-96 h-96 bg-purple-500 rounded-full blur-[128px] opacity-20 pointer-events-none"
    ></div>

    <div
      class="w-full max-w-md p-0.5 rounded-2xl bg-gradient-to-br from-violet-500/30 to-purple-500/10 shadow-2xl relative z-10 mx-4"
    >
      <div
        class="bg-slate-900/90 backdrop-blur-2xl rounded-[15px] p-8 md:p-10 flex flex-col items-center"
      >
        <div
          class="w-14 h-14 bg-gradient-to-br from-violet-500 to-purple-500 rounded-xl flex items-center justify-center shadow-lg shadow-violet-500/30 mb-5"
        >
          <i data-lucide="shield-check" class="text-white w-7 h-7"></i>
        </div>
        <div class="mb-2 flex items-center gap-2">
          <span
            class="text-[10px] font-bold uppercase tracking-widest text-violet-400 bg-violet-500/10 border border-violet-500/20 rounded-full px-3 py-1"
            >Panel Admin</span
          >
        </div>
        <h2
          class="text-2xl md:text-3xl font-bold text-white mb-1 tracking-tight mt-2"
        >
          Login Admin
        </h2>
        <p class="text-slate-400 text-sm mb-7 text-center">
          Akses khusus untuk mengelola data pendaftar ekskul
        </p>

        <div
          id="errorBanner"
          class="hidden w-full mb-5 p-3.5 rounded-xl bg-rose-500/10 border border-rose-500/30 text-rose-400 text-xs flex items-center gap-2"
        >
          <i data-lucide="alert-circle" class="w-4 h-4 flex-shrink-0"></i>
          <span>Username atau password salah. Akses ditolak!</span>
        </div>

        <form id="adminLoginForm" class="w-full space-y-5">
          <div class="space-y-1.5">
            <label
              class="text-xs font-semibold text-slate-300 tracking-wide uppercase"
              >Username Admin</label
            >
            <div class="relative">
              <span
                class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-slate-500"
              >
                <i data-lucide="user-cog" class="w-5 h-5"></i>
              </span>
              <input
                type="text"
                id="adminUsername"
                placeholder="Username admin"
                required
                class="w-full pl-11 pr-4 py-3 bg-slate-950/60 border border-slate-800 rounded-xl text-slate-100 placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-violet-500/50 focus:border-violet-400 transition-all duration-200"
              />
            </div>
          </div>

          <div class="space-y-1.5">
            <label
              class="text-xs font-semibold text-slate-300 tracking-wide uppercase"
              >Password</label
            >
            <div class="relative">
              <span
                class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-slate-500"
              >
                <i data-lucide="key-round" class="w-5 h-5"></i>
              </span>
              <input
                type="password"
                id="adminPassword"
                placeholder="••••••••"
                required
                class="w-full pl-11 pr-4 py-3 bg-slate-950/60 border border-slate-800 rounded-xl text-slate-100 placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-violet-500/50 focus:border-violet-400 transition-all duration-200"
              />
            </div>
          </div>

          <div
            class="p-3 rounded-xl bg-violet-500/5 border border-violet-500/15 text-xs text-slate-500 flex items-start gap-2"
          >
            <i
              data-lucide="info"
              class="w-4 h-4 text-violet-500/60 flex-shrink-0 mt-0.5"
            ></i>
          </div>

          <div class="pt-1">
            <button
              type="submit"
              class="w-full bg-gradient-to-r from-violet-600 to-purple-500 hover:from-violet-500 hover:to-purple-400 text-white font-semibold py-3 px-4 rounded-xl shadow-lg shadow-violet-500/20 hover:shadow-purple-500/30 hover:scale-[1.02] active:scale-[0.98] transition-all duration-300"
            >
              Masuk sebagai Admin
            </button>
          </div>
        </form>

        <p class="text-slate-500 text-sm mt-7">
          Bukan admin?
          <a
            href="index.html"
            class="text-slate-400 hover:text-white font-semibold transition-colors duration-200 ml-1"
            >Kembali ke halaman pengunjung</a
          >
        </p>
      </div>
    </div>

    <script>
      lucide.createIcons();

      if (localStorage.getItem('isAdminLoggedIn') === 'true') {
        window.location.href = 'admin.html';
      }

      document
        .getElementById('adminLoginForm')
        .addEventListener('submit', function (e) {
          e.preventDefault();
          const username = document.getElementById('adminUsername').value;
          const password = document.getElementById('adminPassword').value;
          const ADMIN_USER = 'admin';
          const ADMIN_PASS = 'admin123';

          if (username === ADMIN_USER && password === ADMIN_PASS) {
            localStorage.setItem('isAdminLoggedIn', 'true');
            window.location.href = 'admin.html';
          } else {
            document.getElementById('errorBanner').classList.remove('hidden');
            document.getElementById('adminPassword').value = '';
          }
        });
    </script>
  </body>
</html>
